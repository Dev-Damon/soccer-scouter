<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1220" />
  <title>킥톡 KickTalk — 월드컵 같이 보기</title>
  <meta name="description" content="월드컵·축구를 같이 보고 떠드는 곳. 나라 전력·선수·감독·매치 분석을 한눈에 — 킥톡(KickTalk)." />
  <!-- 파비콘 / 앱 아이콘 (축구공) -->
  <link rel="icon" type="image/svg+xml" href="icon.svg" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <!-- Open Graph / 공유 미리보기 썸네일 -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="킥톡 KickTalk" />
  <meta property="og:title" content="킥톡 KickTalk — 2026 월드컵 같이 보기" />
  <meta property="og:description" content="나라별 전력 · 선수 · 매치 분석. 2026 월드컵을 같이 보는 곳, 킥톡." />
  <meta property="og:url" content="https://kicktalk.xyz/" />
  <meta property="og:image" content="https://kicktalk.xyz/og.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="킥톡 KickTalk — 2026 월드컵 같이 보기" />
  <meta name="twitter:description" content="나라별 전력 · 선수 · 매치 분석. 2026 월드컵을 같이 보는 곳, 킥톡." />
  <meta name="twitter:image" content="https://kicktalk.xyz/og.png" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <button id="backBtn" class="back-btn" hidden aria-label="뒤로">←</button>
    <h1 class="brand" id="homeLink">⚽ 킥톡</h1>
    <span class="tagline">KickTalk · 같이 보기</span>
  </header>

  <main id="app">
    <!-- 검색 -->
    <section class="search-wrap">
      <span class="search-field" style="position:relative;display:block">
        <input id="search" class="search" type="search" inputmode="search"
          placeholder="선수·팀·소속 클럽 검색 (예: 손흥민, 프랑스, 레알)" autocomplete="off"
          style="padding-right:42px" />
        <svg class="search-ic" width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"
          style="position:absolute;right:14px;top:50%;transform:translateY(-50%);color:#9fb0c3;pointer-events:none">
          <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
          <line x1="16.5" y1="16.5" x2="21" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </span>
    </section>

    <!-- 홈 탭(일정/조별) -->
    <nav id="tabs" class="tabs" role="tablist">
      <button class="tab" data-tab="schedule" role="tab">📅 일정</button>
      <button class="tab" data-tab="groups" role="tab">🏆 조별</button>
    </nav>

    <!-- 동적 영역 -->
    <section id="view"></section>
  </main>

  <footer class="foot">
    <span id="sampleNote"></span>
  </footer>

  <!-- 하단 탭바 -->
  <nav id="tabbar" class="tabbar" aria-label="주요 탭">
    <button class="tabbar-btn active" data-nav="home"><span class="tb-ic">📅</span><span class="tb-l">일정</span></button>
    <button class="tabbar-btn" data-nav="search"><span class="tb-ic">🔍</span><span class="tb-l">검색</span></button>
    <button class="tabbar-btn" data-nav="saved"><span class="tb-ic">⭐</span><span class="tb-l">저장</span></button>
    <button class="tabbar-btn" data-nav="my"><span class="tb-ic">👤</span><span class="tb-l">MY</span></button>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/twemoji@14.0.2/dist/twemoji.min.js" crossorigin="anonymous"></script>
  <script src="data.js"></script>
  <script src="comments.js"></script>
  <script src="app.js"></script>
</body>
</html>
