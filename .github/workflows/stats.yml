name: 월드컵 기록 집계 (득점왕)
on:
  schedule:
    - cron: '*/20 * * * *'   # 20분마다 ESPN 집계 → DB(app_data) 적재. 기록탭은 새로고침 시 DB에서 읽음(커밋 안 함)
  workflow_dispatch: {}
concurrency:
  group: stats-update
  cancel-in-progress: false
jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 기록 집계 → DB 적재
        run: node scripts/fetch_stats.js
