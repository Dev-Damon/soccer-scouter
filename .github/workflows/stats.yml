name: 월드컵 기록 집계 (득점왕)
on:
  # schedule(더미확인중 일시정지 — 경기 시작 전 재활성):
    # - cron: "5 * * * *"
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: stats-update
  cancel-in-progress: false
jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 기록 집계 (stats.json)
        run: node scripts/fetch_stats.js
      - name: 변경 시 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stats.json
          if git diff --staged --quiet; then
            echo "기록 변경 없음 — 스킵"
          else
            git commit -m "기록 집계 $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
