name: 베팅 자동 정산
on:
  schedule:
    - cron: '*/20 * * * *'   # 20분마다 — 종료된 경기 베팅 자동 정산(공개 anon RPC, 시크릿 불필요)
  workflow_dispatch: {}
permissions:
  contents: read
concurrency:
  group: bet-settle
  cancel-in-progress: false
jobs:
  settle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # 게이트 — 라이브/최근 종료 경기 없으면 정산 스킵(헛돌지 않게)
      - name: 라이브/최근경기 확인
        id: gate
        run: |
          if node scripts/has_active.mjs; then echo "active=1" >> "$GITHUB_OUTPUT"; else echo "active=0" >> "$GITHUB_OUTPUT"; fi
      - name: 종료 경기 베팅 정산
        if: steps.gate.outputs.active == '1'
        run: node scripts/settle.js
