name: 데이터 자동 갱신 (Auto data update)

# 백엔드 없이 GitHub Actions(서버리스)가 정기 실행 → 데이터 갱신 → 커밋 → Pages 자동 재배포.
# 개막(6/11) 전까지는 비활성(아래 schedule 주석 해제 시 작동). 수동 실행은 Actions 탭 → Run workflow.

on:
  workflow_dispatch: {}        # 수동 실행(언제나 가능)
  # schedule:                  # ⬇️ 개막에 맞춰 주석 해제 (UTC 기준 cron)
  #   - cron: '0 */4 * * *'    # 4시간마다 (조별리그 기간엔 더 자주)

permissions:
  contents: write

concurrency:
  group: data-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Refresh data (결과→순위/대진 재계산, 뉴스/부상 선택)
        run: node scripts/update.mjs
        env:
          # 선택: 부상/뉴스 요약을 AI로 채울 때만 필요 (저장소 Settings→Secrets에 추가)
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Commit & push if data changed
        run: |
          git config user.name "scouter-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "auto: data refresh $(date -u +%FT%TZ)"
            git push
          fi
